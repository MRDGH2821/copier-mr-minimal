---
_exclude:
  - "*.py[co]"
  - "{% if ci != 'github' %}.github{% endif %}"
  - "{% if ci != 'gitlab' %}.gitlab-ci.yml{% endif %}"
  - "{% if not use_agents %}AGENTS.md{% endif %}"
  - "{% if not use_flake %}.envrc{% endif %}"
  - "{% if not use_flake %}flake.nix.jinja{% endif %}"
  - "{% if not use_flake %}flake.nix{% endif %}"
  - "{% if not use_skills %}.agents/skills{% endif %}"
  - "{% if not use_skills %}apm.yml{% endif %}"
  - .DS_Store
  - .git
  - .pre-commit-config-copier.yaml
  - .svn
  - __pycache__
  - copier.yaml
  - copier.yml
  - megalinter-reports
  - ~*
_min_copier_version: 9.0.0
_subdirectory: template
_tasks:
  - command: command -v cog > /dev/null 2>&1 && echo "✓ Cocogitto is installed" || echo "✗ Cocogitto not found! Please install from here - https://docs.cocogitto.io/"
    when: "{{ _copier_operation == 'copy' }}"
  - command: command -v prek > /dev/null 2>&1 && prek install --install-hooks || echo "✗ Prek not found! Please install from here - https://prek.j178.dev/"
    when: "{{ _copier_operation == 'copy' }}"
  - command: command -v treefmt > /dev/null 2>&1 && echo "✓ Treefmt is installed" || echo "✗ Treefmt not found! Please install from here - https://treefmt.com/"
    when: "{{ _copier_operation == 'copy' }}"
  - command: uvx --from apm-cli apm install
    when: "{{ use_skills and _copier_operation == 'copy' }}"
  - command: uvx --from lic-cli lic
    when: "{{ _copier_operation == 'copy' }}"
ci:
  choices:
    GitHub CI: github
    GitLab CI: gitlab
  default: github
  help: What Continuous Integration service do you want to use?
  type: str
project_name:
  help: Enter the name of your project.
  type: str
  validator: "{% if not project_name %} project_name must not be empty. {% elif not (project_name | regex_search('^[a-zA-Z][a-zA-Z0-9 ._-]*$')) %} project_name must start with a letter and contain only letters, digits, spaces, dots, hyphens, or underscores. {% endif %}"
use_agents:
  default: false
  help: Use AGENTS.md?
  type: bool
use_flake:
  default: false
  help: Use flake.nix?
  type: bool
use_skills:
  default: false
  help: Use skills?
  type: bool
use_taste_skill:
  default: false
  help: Use taste-skill?
  type: bool
